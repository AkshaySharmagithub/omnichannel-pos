name: CI Pipeline

on:
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  server-checks:
    name: Server Lint and Typecheck
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: npm run typecheck